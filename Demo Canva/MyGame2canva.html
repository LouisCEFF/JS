<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>

<body>

    <canvas id="plateau"></canvas>

    <script>
        const CELL_SIZE = 50;
        const NB_COLS = 10;
        const NB_ROWS = 10;
        const plateau = document.getElementById("plateau");
        plateau.addEventListener("click", onClickElement);
        plateau.setAttribute("width", `${NB_COLS * CELL_SIZE}px`);
        plateau.setAttribute("height", `${NB_ROWS * CELL_SIZE}px`);
        /** @type {CanvasRenderingContext2D} */
        const ctx = plateau.getContext("2d");
        const colors = ["lightgray", "red", "blue", "yellow", "cyan", "green"];
        const jeu = [];
        init();
        function init() {
            for (let y = 0; y < NB_ROWS; y++) {
                jeu[y] = [];
                for (let x = 0; x < NB_COLS; x++) {
                    jeu[y][x] = {
                        posX: x,
                        posY: y,
                        colorIndex: 0,
                    }
                }
            }
            refresh();
        }
        function onClickElement(e) {

            const posX = Math.floor(e.clientX / CELL_SIZE);
            const posY = Math.floor(e.clientY / CELL_SIZE);
            incElement(posX, posY);
            incElement(posX - 1, posY);
            incElement(posX + 1, posY);
            incElement(posX, posY - 1);
            incElement(posX, posY + 1);
            // incElement(posX + 1, posY + 1);
            // incElement(posX - 1, posY - 1);
            // incElement(posX - 1, posY + 1);
            // incElement(posX + 1, posY - 1);
            refresh();
        }

        function incElement(x, y) {
            if (x >= 0 && x < 10 && y >= 0 && y < 10) {
                jeu[y][x].colorIndex = (jeu[y][x].colorIndex + 1) % colors.length;
            }
        }

        function refresh() {
            for (let y = 0; y < NB_ROWS; y++) {
                for (let x = 0; x < NB_COLS; x++) {
                    const element = jeu[y][x];
                    ctx.fillStyle = colors[element.colorIndex];
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE)
                    ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE)
                }
            }
        }
    </script>
</body>

</html>
