<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>var exports = {};</script>
    <script src="./dist/SokoScript.js" type="module" defer></script>
    <title>Sokoban</title>
    <style>
        body {
            background-color: lightgreen;
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 80px;
        }

        #overlay {
            position: fixed;
            /* Sit on top of the page content */
            display: none;
            /* Hidden by default */
            width: 100%;
            /* Full width (cover the whole page) */
            height: 100%;
            /* Full height (cover the whole page) */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.1);
            /* Black background with opacity */
            z-index: 2;
            /* Specify a stack order in case you're using a different order for other elements */
            /* cursor: pointer; */
            /* Add a pointer on hover */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .center-select {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .select-title {
            font-size: 30px;
            border: 1px solid black;
            border-radius: 8px;
            padding: 20px;
            padding-left: 120px;
            padding-right: 120px;
            font-family: 'Brush Script MT', cursive;
        }

        .select-bar {
            padding: 20px;
            background-color: transparent;
        }
    </style>
</head>

<body>
    <div class="center-select">
        <option class="select-title" selected disabled style="color: black;">level packs:</option><br>
        <select class="select-bar" name="Directories" id="dirs"></select><br><br>
        <option class="select-title" selected disabled style="color: black;">levels:</option><br>
        <select class="select-bar" name="Levels" id="lvls"></select>
    </div>
    <div id="overlay"></div>
    <div class="center">
        <canvas id="SOKOBAN"></canvas>
    </div>
    <div class="center">
        <p>R ou ESC pour restart</p>
        <p>Z pour annuler le dernier movement (peut se casser si il y a trop de movement)</p>
        <p>WASD ou ←↓↑→ pour ce déplacer </p>
    </div>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Blocks/block_01.png" id="block" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Crates/crate_01.png" id="crate" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Ground/ground_05.png" id="blank" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Ground/ground_02.png" id="goal" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_01.png" id="playerD" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_15.png" id="playerL" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_13.png" id="playerR" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_03.png" id="playerU" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Crates/crate_31.png" id="onGoal" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_05.png" id="onPlayer" hidden>
