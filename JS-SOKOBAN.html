<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokoban</title>
    <style>
        body {
            background-color: lightgreen;
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 150px;
        }

        #overlay {
            position: fixed;
            /* Sit on top of the page content */
            display: none;
            /* Hidden by default */
            width: 100%;
            /* Full width (cover the whole page) */
            height: 100%;
            /* Full height (cover the whole page) */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.1);
            /* Black background with opacity */
            z-index: 2;
            /* Specify a stack order in case you're using a different order for other elements */
            /* cursor: pointer; */
            /* Add a pointer on hover */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body onload="init()">
    <div>
        <option selected disabled style="color: black;">level packs:</option>
        <select name="Directories" id="dirs"></select><br><br>
        <option selected disabled style="color: black;">levels:</option>
        <select name="Levels" id="lvls"></select>
    </div>
    <div id="overlay"></div>
    <div class="center">
        <canvas id="SOKOBAN"></canvas>
    </div>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Blocks/block_01.png" id="block" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Crates/crate_01.png" id="crate" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Ground/ground_05.png" id="blank" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Ground/ground_02.png" id="goal" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_01.png" id="player" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Crates/crate_31.png" id="onGoal" hidden>
    <img src="./images/sheets/kenney_sokoban-pack/PNG/Default_size/Player/player_05.png" id="onPlayer" hidden>
    <script>
        // "  ####\r\n ##@ #\r\n## * #\r\n#  $ #\r\n#  . #\r\n######"
        // "######\r\n#    #\r\n# #$ #\r\n# .$.#\r\n#  @ #\r\n######"
        // "#####\r\n#    #\r\n#. $ #\r\n#.#$##\r\n#    #\r\n#  @ #\r\n######"
        // "#####\r\n##.. #\r\n# $. #\r\n# $. #\r\n# $$ #\r\n# @###\r\n####"
        //"          ##########\r\n  ###### #  #...  #\r\n ##    # #  *...# #\r\n #   $ # #  #..   #\r\n #   ###### ## # ##\r\n # #       $#    #\r\n # # ##$##  # $  #\r\n # $ ##   $ #### #\r\n # # #  ## $#  #$#\r\n # #$# $@##.#.   #\r\n # #   $$# ...#$ #\r\n## ### # # ...#  #\r\n#  #  $  ######  #\r\n#    $         $ #\r\n##############  ##\r\n             ####"
        //"       #################\r\n      ##               ##\r\n     ##  * * * * * * *  ##\r\n    ##  * * * * * * * *  ##\r\n   ##  * * * * * * * * *  ##\r\n  ##  * * * * *** * * * *  ##\r\n ##  * * * * * * * * * * *  ##\r\n##  * * * *** * * *** * * *  ##\r\n#  * * * * * * * * * * * * *  #\r\n#.* * *** * * *$* * * *** * *@#\r\n#  * * * * * * * * * * * * *  #\r\n##  * * * *** * * *** * * *  ##\r\n ##  * * * * * * * * * * *  ##\r\n  ##  * * * * *** * * * *  ##\r\n   ##  * * * * * * * * *  ##\r\n    ##  * * * * * * * *  ##\r\n     ##  * * * * * * *  ##\r\n      ##               ##\r\n       #################"
        //"      ######\r\n      #    #\r\n      # @  ###\r\n####  #.$$   #\r\n#  ####..#.#*#####\r\n# $ $ ##.*.*     #\r\n#    ....*.#$$   #\r\n###### ##*## #####\r\n     #  $    #\r\n     #### ####\r\n       #  #\r\n       #  #####\r\n     ### $    #\r\n     #  $ $   #\r\n     # #$# ####\r\n     #     #\r\n     ####### "
        //"     #####   \r\n   ###   #   \r\n   #   $ #   \r\n   # $ $#### \r\n   # # $   # \r\n#### ##  $ # \r\n#  $ ####  # \r\n#@ $  ..# ## \r\n###$### # ###\r\n #  #....*  #\r\n #  $ .*..  #\r\n #  #  ######\r\n ####### "
        // 
        // 
        // "         ##########  ###### #  #...  # ##    # #  *...# # #   $ # #  #..   # #   ###### ## # ## # #       $#    # # # ##$##  # $  # # $ ##   $ #### # # # #  ## $#  #$# # #$# $@##.#.   # # #   $$# ...#$ ### ### # # ...#  ##  #  $  ######  ##    $         $ ###############  ##             ####"
        let testGame = [];
        // loadDirs();
        const cellSize = 60;
        const dirselect = document.getElementById('dirs');
        dirselect.addEventListener("change", loadLvlsForDir);
        const lvlselect = document.getElementById('lvls');
        lvlselect.addEventListener("change", async () => {
            await loadLvl();
            init();
        });
        let playable = true;

        function images(action) {
            return document.getElementById(action);
        };

        const charToAction = {
            "#": "block",
            "$": "crate",
            " ": "blank",
            ".": "goal",
            "@": "player",
            "*": "onGoal",
            "+": "onPlayer"
        };
        let rowNum = 1;
        let colNum = 0;
        let sokobanSpace = [];
        let sokobanCrates = [];
        let onGoals = 0;
        const sokoban = document.getElementById("SOKOBAN");
        /** @type {CanvasRenderingContext2D} */
        const ctx = sokoban.getContext("2d");
        const player = {
            x: 0,
            y: 0,
            onGoal: false,
            move: function (dx, dy) {
                const tx = player.x + dx;
                const ty = player.y + dy;
                if (sokobanSpace[ty][tx].isWall == true) {
                    return;
                }
                if (sokobanCrates.find((c) => c.x == tx && c.y == ty)) {
                    if (moveCrate(dy, dx, tx, ty) == false) {
                        return;
                    }
                    // moveCrate(dy, dx, tx, ty);
                }
                if (sokobanSpace[ty][tx].char == ".") {
                    player.onGoal = true;
                } else {
                    player.onGoal = false;
                }

                // if (prevImage == "+") {
                //     prImg = sokobanSpace[player.y][player.x].char = "."
                // }
                player.x = tx;
                player.y = ty;
                refresh();
            }
        }
        // init();
        async function init() {
            if (testGame.length == 0) {
                await loadDirs();
            }
            let index = 0;
            sokobanSpace = [];
            sokobanCrates = [];
            onGoals = 0;
            let string = "";
            let char = testGame;
            colNum = 0;
            rowNum = 1;
            for (let i = 0; i < testGame.length; i++) {
                colNum = Math.max(colNum, testGame.length);
                rowNum = Math.max(rowNum, testGame[i].length);
                // if (lines[i].length >= lines[i + 1].length) {
                //     colNum = lines[i].length;
                //     break;
                // }
            }
            sokoban.setAttribute("width", `${rowNum * cellSize}px`);
            sokoban.setAttribute("height", `${colNum * cellSize}px`);
            for (let i = 0; i < char.length; i++) {
                if (char[i].length < rowNum) {
                    for (let o = char[i].length; o < rowNum; o++) {
                        char[i] += " ";
                    }
                }
                string += char[i];
            }
            for (let y = 0; y < colNum; y++) {
                sokobanSpace[y] = [];
                for (let x = 0; x < rowNum; x++) {
                    char = string.substring(0 + index, 1 + index);
                    if (char == "$" || char == "*") {
                        if (char == "*") {
                            sokobanCrates.push({ x: x, y: y, onGoal: true });
                        } else {
                            sokobanCrates.push({ x: x, y: y, onGoal: false });
                        }
                    }
                    if (char == "@" || char == "+") {
                        player.y = y;
                        player.x = x;
                        if (char == "+") {
                            player.onGoal = true;
                        } else {
                            player.onGoal = false;
                        }
                    }
                    if (char == "*") {
                        sokobanSpace[y][x] = {
                            char: ".",
                            isWall: false,
                            isPlayer: false,
                        }
                    }
                    if (char != "@" && char != "$" && char != "*" && char != "+") {
                        sokobanSpace[y][x] = {
                            char: char,
                            isWall: false,
                            isPlayer: false,
                        }
                    } else if (char != "*") {
                        sokobanSpace[y][x] = {
                            char: " ",
                            isWall: false,
                            isPlayer: false,
                        }
                    }
                    if (char == "") {
                        sokobanSpace[y][x] = {
                            char: " ",
                            isWall: false,
                            isPlayer: false,
                        }
                    }
                    if (char == "#") {
                        sokobanSpace[y][x].isWall = true;
                    }
                    index++;
                }
            }
            refresh();
        }
        async function loadDirs() {
            const dirs = await window.api.getdir()
            fillselDir(dirs);
            await loadLvlsForDir();

        };
        function fillselDir(dirs) {
            dirselect.innerHTML = "";
            for (let d of dirs) {
                dirselect.innerHTML += `<option value ="${d}">${d}</option>`;
            };
        }
        async function loadLvlsForDir() {
            const dirpath = dirselect.value;
            const levels = await window.api.getlvls(dirpath)
            fillSelLvls(levels);
            await loadLvl();
        }
        function fillSelLvls(levels) {
            lvlselect.innerHTML = "";
            for (let l of levels) {
                lvlselect.innerHTML += `<option value="${l}">${l}</option>`;
            }
        }
        async function loadLvl() {
            const dirpath = dirselect.value;
            const lvl = lvlselect.value;

            if (!dirpath || !lvl) {
                return;
            }

            const data = await window.api.loadlvl(dirpath, lvl);
            initLevel(data);
        }

        function initLevel(data) {
            testGame = data;
        }
        function refresh() {

            for (let y = 0; y < colNum; y++) {
                for (let x = 0; x < rowNum; x++) {
                    // const e = sokobanSpace[y][x];
                    ctx.fillStyle = "lightgreen";
                    let space = sokobanSpace;
                    let char = sokobanSpace[y][x].char;
                    // setTimeout(() => {
                    // }, 1);
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    image = images(charToAction[char]);
                    if (char != " ") {
                        ctx.drawImage(images(charToAction[' ']), x * cellSize, y * cellSize);
                        ctx.drawImage(image, x * cellSize + 5, y * cellSize + 5, 50, 50);
                    } else {
                        ctx.drawImage(image, x * cellSize, y * cellSize);
                    }
                    if (player.onGoal == true && player.x == x && player.y == y) {
                        ctx.drawImage(images(charToAction["+"]), player.x * cellSize + 5, player.y * cellSize + 5, 50, 50);
                    } else if (player.onGoal == false && player.x == x && player.y == y) {
                        ctx.drawImage(images(charToAction["@"]), player.x * cellSize + 5, player.y * cellSize + 5, 50, 50);
                    }
                }
            }
            for (let c of sokobanCrates) {
                if (sokobanSpace[c.y][c.x].char == "." && c.onGoal == true) {
                    ctx.drawImage(images(charToAction["*"]), c.x * cellSize + 5, c.y * cellSize + 5, 50, 50);
                }
                else if (sokobanSpace[c.y][c.x].char == ".") {
                    ctx.drawImage(images(charToAction["."]), c.x * cellSize + 5, c.y * cellSize + 5, 50, 50);
                }
                else {
                    ctx.drawImage(images(charToAction["$"]), c.x * cellSize + 5, c.y * cellSize + 5, 50, 50);
                }
            }
        }
        function gameOver() {
            let overlay = document.getElementById("overlay");
            if (playable == true) {
                overlay.style.backgroundColor = "rgba(0, 0, 0, 0.1)";
                overlay.style.height = "100%";
                overlay.style.width = "100%";
                overlay.style.display = "flex";
                overlay.innerHTML = "<h1>Bravo vous avez terminé</h1>\r\n<h2>Appuyer sur ESC ou R pour recommencer</h2>";
                overlay.style.fontSize = "20px";
                playable = false;
                return;
            }
            if (playable == false) {
                overlay.style.height = "0%";
                overlay.style.width = "0%";
                overlay.display = "none";
                overlay.innerHTML = "";
                overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"
                playable = true;
                return;
            }
        }
        function moveCrate(dy, dx, x, y) {
            for (let c of sokobanCrates) {
                if (c.x == x && c.y == y) {
                    if (sokobanSpace[y + dy][dx + x].isWall == true) {
                        return false;
                    }
                    if (sokobanCrates.find((crate) => crate.y == c.y + dy && crate.x == c.x + dx)) {
                        return false;
                    }
                    if (sokobanSpace[c.y][c.x].char == ".") {
                        c.onGoal = !c.onGoal;
                        if (onGoals != 0) {
                            onGoals--;
                        }
                    }
                    c.x = x + dx;
                    c.y = y + dy;
                    if (sokobanSpace[c.y][c.x].char == ".") {
                        c.onGoal = true;
                        onGoals++;
                    }
                    if (onGoals == sokobanCrates.length) {
                        gameOver();
                    }
                    //     sokobanSpace[c.y][c.x].char = "*";
                    // else {
                    //     sokobanSpace[c.y][c.x].char = "$";
                    // }
                }
            }
            refresh();
        }
        document.addEventListener("keydown", function (event) {
            if (event.key == "Escape" || event.key == "r") {
                if (onGoals == sokobanCrates.length) {
                    gameOver();
                }
                init();
            }
            if (playable == true) {
                if (event.key == "w") {
                    player.move(0, -1);
                }
                if (event.key == "a") {
                    player.move(-1, 0);
                }
                if (event.key == "d") {
                    player.move(1, 0);
                }
                if (event.key == "s") {
                    player.move(0, 1);
                }
            }
        })
    </script>
</body>

</html>
