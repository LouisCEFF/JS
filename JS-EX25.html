<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 25</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div>
        <div>
            <div id="lamp" style="width: 1px; border: 1px solid black; border-radius: 200px; margin-left: 48px; padding: 30px; background-color: rgb(184, 134, 11);"></div><br><br>
            <button id="start" style="width: 160px;" onclick="start()">Cliquer pour commencer</button>
        </div>
        <p id="time"></p>
        <button id="restart" style="display: none; margin-left: 30px;" onclick="restart()">Recommencer</button>
    </div>

    <script>
        let clickNumber = 0;
        let date1 = Date;
        let date2 = Date;
        let restartButton = document.getElementById("restart");
        let timeout;
        function start(){
            document.getElementById("start").style.height = "50px";
            document.getElementById("start").style.backgroundColor = "darkred";
            document.getElementById("start").style.borderRadius = "20px";
            document.getElementById("start").style.border = "1px solid black";
            document.getElementById("start").innerText = "BUZZER";
            let rng = Math.floor(Math.random() * 500) + 1000;
            if (clickNumber == 0) {
                timeout = setTimeout(() => {
                    document.getElementById("lamp").style.backgroundColor = "yellow";
                    date1 = Date.now();
                }, rng);
            }
            if (clickNumber == 1 && document.getElementById("lamp").style.backgroundColor == "yellow") {
                date2 = Date.now();
                // document.getElementById("lamp").style.marginLeft = "140px";
                // document.getElementById("time").style.marginLeft = "140px";
                // document.getElementById("start").style.marginLeft = "140px";
                // document.getElementById("restart").style.marginLeft = "140px";
                check(date1, date2);
                clearTimeout(timeout);
                restartButton.style.display = "inline";
            } else if (clickNumber == 1 && document.getElementById("lamp").style.backgroundColor == "rgb(184, 134, 11)") {
                document.getElementById("time").innerText = `Vous avez cliquer trop tôt`;
                clearTimeout(timeout);
                restartButton.style.display = "inline";
                }
            clickNumber++;
        }
        function check(date1, date2) {
            document.getElementById("time").innerText = `Votre temps de réaction est de ${date2 - date1} ms.`;
        }
        function restart() {
            clickNumber = 0;
            document.getElementById("time").innerText = "";
            document.getElementById("start").style.height = "";
            document.getElementById("start").style.backgroundColor = "";
            document.getElementById("start").style.borderRadius = "";
            document.getElementById("start").style.border = "";
            document.getElementById("lamp").style.backgroundColor = "rgb(184, 134, 11)";
            document.getElementById("start").innerText = "Cliquer pour commencer";
            restartButton.style.display = "none";
        }
    </script>
</body>
</html>
